# ============================================================
# Lightning-LM 全局默认配置文件
# ============================================================

# ========== 通用配置 ==========
common:
  dataset: "nclt"                      # 数据集名称（nclt / utbm / vbr / robosense / livox 等）
  lidar_topic: "points_raw"           # 激光雷达原始点云话题名
  livox_lidar_topic: "/livox/lidar"   # Livox 系列激光雷达话题名
  imu_topic: "/livox/imu"             # IMU 话题名

# ========== Faster-LIO 前端里程计参数 ==========
fasterlio:
  lidar_type: 1                       # 激光雷达类型: 1=Livox, 2=Velodyne, 3=Ouster
  scan_line: 32                       # 激光雷达扫描线数（仅对 Velodyne/Ouster 有效）
  blind: 0.1                          # 盲区距离(m)，小于此距离的点云不参与处理
  time_scale: 1e-3                    # 时间戳缩放因子，兼容不同数据集的时间单位（仅 Velodyne 有效）

  skip_lidar_num: 0                   # 跳帧数：每隔 N 帧处理一次点云（0 表示不跳帧）
  point_filter_num: 4                 # 点云降采样参数：每 N 个点取 1 个
  max_iteration: 4                    # 状态估计最大迭代次数
  filter_size_scan: 0.5              # 当前帧点云体素降采样尺寸(m)
  filter_size_map: 0.5               # 地图点云体素降采样尺寸(m)

  ivox_grid_resolution: 0.5          # iVox 体素地图分辨率(m)
  ivox_nearby_type: 18               # iVox 邻近搜索类型: 6(面)/18(棱)/26(全)
  esti_plane_threshold: 0.1          # 平面估计阈值：平面拟合最小特征值比例

  use_aa: false                      # 是否启用 Anderson Acceleration 加速收敛

  acc_cov: 0.1                       # 加速度计噪声协方差
  gyr_cov: 0.1                       # 陀螺仪噪声协方差
  b_acc_cov: 0.0001                  # 加速度计偏置随机游走噪声协方差
  b_gyr_cov: 0.0001                  # 陀螺仪偏置随机游走噪声协方差
  extrinsic_est_en: false            # 是否在线估计 IMU-LiDAR 外参
  extrinsic_T: [ 0, 0, 0.28 ]        # IMU-LiDAR 外参平移向量 (x, y, z) 单位 m
  extrinsic_R: [ 1, 0, 0,            # IMU-LiDAR 外参旋转矩阵 (行优先)
                 0, 1, 0,
                 0, 0, 1 ]
  keep_first_imu_estimation: false   # 是否保留首次 IMU 初始化估计结果
  kf_dis_th: 1.0                     # 关键帧选取平移阈值(m)：位移超过此值则新建关键帧
  kf_angle_th: 10.0                  # 关键帧选取角度阈值(°)：旋转超过此值则新建关键帧

  enable_icp_part: false             # 是否启用 ICP 点云配准辅助模块
  plane_icp_weight: 300.0            # 平面约束在 ICP 中的权重
  min_pts: 500                       # 有效帧最少点数，低于此值的帧被丢弃
  imu_filter: false                  # 是否对 IMU 数据进行滤波
  proj_kfs: false                    # 是否投影关键帧到当前帧用于降噪

# ========== G2P5 栅格地图参数 ==========
g2p5:
  esti_floor: false                  # 是否动态估计地面高度
  lidar_height: 0.0                  # 激光雷达安装高度(m)
  floor_height: -1.2                 # 默认地面高度(m)
  min_th_floor: 0.50                 # 地面障碍物筛选下界(m)：高于地面此值以上的障碍物被保留
  max_th_floor: 1.0                  # 地面障碍物筛选上界(m)：高于地面此值以下的障碍物被保留
  grid_map_resolution: 0.2           # 2D 栅格地图分辨率(m/格)

# ========== 系统功能开关 ==========
system:
  with_loop_closing: true            # 是否启用回环检测模块
  with_ui: true                      # 是否启用 3D 可视化界面 (Pangolin)
  with_2dui: false                   # 是否启用 2D 可视化界面
  with_g2p5: true                    # 是否启用栅格地图生成模块
  step_on_kf: false                  # 是否在处理每个关键帧时暂停（调试用）

  enable_lidar_loc_skip: false       # 是否跳帧执行 LiDAR 定位
  enable_lidar_loc_rviz: false       # 是否在 Rviz 中发布 LiDAR 定位结果
  enable_lidar_odom_skip: false      # 是否跳帧执行 LiDAR 里程计
  evaluation: false                  # 是否启用评估模式（保存轨迹用于精度评测）
  lidar_loc_skip_num: 4             # LiDAR 定位跳帧数：每 N 帧执行一次定位
  lidar_odom_skip_num: 2            # LiDAR 里程计跳帧数：每 N 帧执行一次里程计
  map_path: ./data/new_map/          # 地图保存/加载路径
  pub_tf: true                       # 是否发布 TF 坐标变换

# ========== 回环检测参数 ==========
loop_closing:
  loop_kf_gap: 20                    # 每隔多少个关键帧触发一次回环检测
  min_id_interval: 20                # 回环候选关键帧与当前帧的最小 ID 间隔
  closest_id_th: 50                  # 回环候选帧与当前帧的 ID 间隔上限
  max_range: 20.0                    # 回环候选帧的最大空间距离(m)
  ndt_score_th: 1.3                  # NDT 配准分数阈值，低于此值视为有效回环
  with_height: false                 # 回环检测是否考虑高度信息

# ========== LiDAR 定位参数 ==========
lidar_loc:
  enable_dynamic_polygon: false      # 是否启用动态多边形区域过滤
  enable_parking_static: true        # 是否启用静态停车区域模式
  enable_icp_adjust: false           # 是否启用 ICP 微调定位结果
  filter_intensity_max: 100.0        # 点云强度过滤上限（滤除过亮噪点）
  filter_intensity_min: 10.0         # 点云强度过滤下限（滤除过暗噪点）
  filter_z_max: 30.0                 # 点云 Z 轴最大值过滤(m)
  filter_z_min: -1.0                 # 点云 Z 轴最小值过滤(m)
  force_2d: false                    # 是否强制使用 2D 定位（忽略高度变化）
  grid_search_angle_range: 180.0     # 全局初始化时网格搜索的角度范围(°)
  grid_search_angle_step: 60         # 全局初始化时网格搜索的角度步长(°)
  lidar_loc_odom_th: 0.5            # 定位与里程计一致性阈值(m)
  init_with_fp: true                 # 是否使用指纹匹配初始化定位
  min_init_confidence: 1.8           # 初始化最低置信度阈值
  update_dynamic_cloud: false        # 是否更新动态点云地图
  update_err_h: 0.2                  # 地图更新水平位置误差阈值(m)
  update_err_v: 0.2                  # 地图更新垂直高度误差阈值(m)
  update_kf_dis: 2.0                # 定位更新时检查的关键帧距离阈值(m)
  update_lidar_loc_score: 2.5       # 定位更新最低分数阈值
  loc_on_kf: true                   # 是否仅在关键帧上进行定位
  try_self_extrap: false            # 是否尝试自身外推定位（无匹配时）

# ========== 地图管理参数 ==========
maps:
  delete_when_unload: false          # 卸载地图时是否删除地图数据文件
  dyn_cloud_policy: persistent       # 动态点云管理策略（persistent: 持久保存）
  load_dyn_cloud: true               # 是否加载动态点云地图
  load_map_size: 2                   # 加载地图时预加载区域尺寸(格)
  max_pts_dyn_chunk: 100000          # 每个动态点云分块的最大点数
  save_dyn_when_quit: true           # 退出时是否保存动态点云
  save_dyn_when_unload: false        # 卸载时是否保存动态点云
  unload_map_size: 4                 # 卸载地图时保留区域尺寸(格)
  with_dyn_area: false               # 是否启用动态区域管理

# ========== 位姿图优化(PGO)参数 ==========
pgo:
  dr_ang_noise: 0.5                  # 航位推算(DR)角度噪声标准差(°)
  dr_pos_noise: 1.0                  # 航位推算(DR)位置噪声标准差(m)
  dr_pos_noise_ratio: 1.0           # 航位推算位置噪声比例系数
  lidar_loc_ang_noise: 1.0          # LiDAR 定位角度噪声标准差(°)
  lidar_loc_outlier_th: 5.0         # LiDAR 定位外点剔除阈值(m)
  lidar_loc_pos_noise: 0.3          # LiDAR 定位位置噪声标准差(m)
  lidar_odom_ang_noise: 1.0         # LiDAR 里程计角度噪声标准差(°)
  lidar_odom_pos_noise: 0.3         # LiDAR 里程计位置噪声标准差(m)
  pgo_frame_converge_ang_th: 1.0    # PGO 收敛判断-角度变化阈值(°)
  pgo_frame_converge_pos_th: 0.05   # PGO 收敛判断-位置变化阈值(m)
  rtk_fix_ang_noise: 2.0            # RTK 固定解角度噪声标准差(°)
  rtk_fix_pos_noise: 1.0            # RTK 固定解位置噪声标准差(m)
  rtk_height_noise_ratio: 10.0      # RTK 高度噪声比例（相对水平位置）
  rtk_other_ang_noise: 10.0         # RTK 非固定解角度噪声标准差(°)
  rtk_other_pos_noise: 5.0          # RTK 非固定解位置噪声标准差(m)
  rtk_outlier_th: 1.0               # RTK 外点剔除阈值(m)
  smooth_factor: 0.01               # 轨迹平滑因子

# ========== ROI 兴趣区域过滤 ==========
roi:
  height_max: 10.0                  # ROI 最大高度(m)，高于此值点云被滤除
  height_min: 0.5                   # ROI 最小高度(m)，低于此值点云被滤除
  range_max: 70                     # ROI 最大距离(m)，超出此范围的点云被滤除
  range_min: 3.0                    # ROI 最小距离(m)，小于此距离的点云被滤除

# ========== UI 可视化参数 ==========
ui:
  car_length: 2.0                   # 3D 模型中车身长度(m)
  car_width: 1.6                    # 3D 模型中车身宽度(m)
  car_height: 1.7                   # 3D 模型中车身高度(m)
  scans: 1                          # 显示的最新扫描帧数
